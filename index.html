const LEAVE_TYPES = {
  A:{name:'ลากิจ',quota:3,emoji:'📋'},B:{name:'พักร้อน',quota:7,emoji:'🏖️'},
  C:{name:'ลาป่วย (ไม่มีใบ)',quota:10,emoji:'🤒'},D:{name:'ลาป่วย (มีใบ)',quota:20,emoji:'🏥'},
  E:{name:'Shortbreak',quota:4,emoji:'☕'},F:{name:'ลาพิเศษ',quota:null,emoji:'✨'},
  G:{name:'ลาวันเกิด',quota:1,emoji:'🎂'},
};
const TEAM_META = {
  red:   {label:'❤️ PM',         grad:'#ef4444,#f87171'},
  yellow:{label:'💛 ทีม QA',     grad:'#f59e0b,#fbbf24'},
  green: {label:'💚 ทีม CS',     grad:'#059669,#34d399'},
  blue:  {label:'💙 ทีม Ingame', grad:'#2563eb,#60a5fa'},
  purple:{label:'💜 ทีม Content',grad:'#7c3aed,#a78bfa'},
};
const NAME_TEAM = {};
LEAVE_DATA.forEach(e => { if(!NAME_TEAM[e.name]) NAME_TEAM[e.name]=e.team; });
const allNames = [...new Set(LEAVE_DATA.map(e=>e.name))].sort();
let selectedName = null;

function renderChips(filter) {
  const sec = document.getElementById('chipsSection');
  const ORDER = ['red','yellow','green','blue','purple'];
  if (filter) {
    const list = allNames.filter(n=>n.toLowerCase().includes(filter.toLowerCase()));
    if (!list.length) { sec.innerHTML=`<div class="no-results" style="padding:8px 0;color:#c0b8d8;font-size:13px">ไม่พบ "${filter}" 🥲</div>`; return; }
    sec.innerHTML = `<div class="chips-row" style="padding:4px 0">${list.map(n=>chipHTML(n,NAME_TEAM[n]||'yellow')).join('')}</div>`;
    return;
  }
  let html='';
  ORDER.forEach(team=>{
    const names=allNames.filter(n=>(NAME_TEAM[n]||'yellow')===team);
    if(!names.length)return;
    html+=`<div class="team-group"><div class="team-label ${team}">${TEAM_META[team].label} · ${names.length} คน</div><div class="chips-row">${names.map(n=>chipHTML(n,team)).join('')}</div></div>`;
  });
  sec.innerHTML=html;
}
function chipHTML(name,team){
  const a=name===selectedName?'active '+team:'';
  const s=name.replace(/'/g,"\\'");
  return `<div class="chip ${a}" onclick="selectName('${s}')"><div class="chip-avatar ${team}">${name[0].toUpperCase()}</div>${name}</div>`;
}
function selectName(name){
  selectedName=name;
  document.getElementById('searchInput').value=name;
  document.getElementById('clearBtn').classList.add('show');
  renderChips(name);renderView(name);
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('show');
  selectedName=null;renderChips('');
  document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="big-icon">🌷</div><p>เลือกชื่อจากทีมด้านบน<br>หรือพิมพ์ค้นหาในช่อง Search</p></div>`;
}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'});}
function renderView(name){
  const recs=LEAVE_DATA.filter(e=>e.name===name);
  const main=document.getElementById('mainContent');
  if(!recs.length){main.innerHTML=`<div class="empty-state"><div class="big-icon">🔍</div><p>ไม่พบข้อมูลของ "${name}"</p></div>`;return;}
  const tally={};recs.forEach(r=>{tally[r.type_code]=(tally[r.type_code]||0)+r.days;});
  const total=recs.reduce((s,r)=>s+r.days,0);
  const team=NAME_TEAM[name]||'yellow';
  const meta=TEAM_META[team];
  const cards=Object.keys(LEAVE_TYPES).map(code=>{
    const info=LEAVE_TYPES[code];const used=tally[code]||0;const q=info.quota;
    const pct=q?Math.min((used/q)*100,100):0;
    const rem=q!==null?q-used:null;
    const remText=rem===null?'ไม่จำกัด':rem>0?`เหลือ ${rem} วัน`:rem===0?'ใช้ครบแล้ว':`เกิน ${Math.abs(rem)} วัน`;
    const remClass=rem===null?'unlimited':rem>1?'ok':rem===1?'warn':'over';
    return `<div class="quota-card t-${code}"><div class="qc-top"><span class="qc-badge">${info.emoji} ${code}</span><span class="qc-remaining ${remClass}">${remText}</span></div><div class="qc-nums"><span class="qc-used">${used}</span><span class="qc-of">${q!==null?'/ '+q:''} วัน</span></div><div class="qc-name">${info.name}</div>${q!==null?`<div class="qc-bar-wrap"><div class="qc-bar" style="width:${pct}%"></div></div>`:''}</div>`;
  }).join('');
  const rows=recs.map(r=>{const info=LEAVE_TYPES[r.type_code]||{};return `<div class="log-row"><span class="log-date">${fmtDate(r.date)}</span><span class="log-type"><span class="log-badge t-${r.type_code} qc-badge">${info.emoji||''} ${info.name||r.type_code}</span></span><span class="log-days">−${r.days} วัน</span></div>`;}).join('');
  main.innerHTML=`<div class="person-card" style="background:linear-gradient(135deg,${meta.grad})"><div class="person-big-avatar">${name[0].toUpperCase()}</div><div><div class="person-name">${name}</div><div class="person-sub">${meta.label} · ${recs.length} รายการ</div></div><div class="person-total"><div class="total-num">${total}</div><div class="total-label">วันที่ลา</div></div></div><div class="section-title">📊 โควต้าวันลา</div><div class="quota-grid">${cards}</div><div class="section-title">📅 ประวัติการลา</div><div class="log-card"><div class="log-header"><span class="log-header-text">รายการทั้งหมด</span><span class="log-pill">${recs.length}</span></div>${rows}</div>`;
}
document.getElementById('searchInput').addEventListener('input',function(){
  const val=this.value.trim();
  document.getElementById('clearBtn').classList.toggle('show',val.length>0);
  renderChips(val);
  const exact=allNames.find(n=>n.toLowerCase()===val.toLowerCase());
  if(exact){selectedName=exact;renderView(exact);}
  else if(!val){clearSearch();}
});
